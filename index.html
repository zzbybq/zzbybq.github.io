<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#5ba3dd">
  <title>观澜湖</title>
  <link rel="stylesheet" href="css/mission-hills-app.css">
</head>
<body>
  <main class="app-shell home-shell" aria-label="观澜湖首页">
    <section class="home-hero" aria-label="观澜湖球场轮播图" data-home-carousel>
      <div class="home-slides" data-home-slides>
        <figure class="home-slide" aria-label="湖景球场">
          <img src="images/home-hero-live.jpg" alt="观澜湖湖景球场">
        </figure>
        <figure class="home-slide" aria-label="航拍会所">
          <img src="images/home-hero-aerial.jpg" alt="观澜湖高尔夫球场及会所航拍">
        </figure>
      </div>
      <div class="home-scroll-cue" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <p class="sr-only" aria-live="polite" data-home-status>第 1 张，共 2 张</p>
    </section>

    <nav class="tabbar" aria-label="主导航">
      <a class="tabbar-item is-active" href="index.html" aria-current="page">
        <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M4 14.5 16 4l12 10.5M7.5 13v14h6v-8h5v8h6V13"/></svg>
        <span>首页</span>
      </a>
      <span class="tabbar-item" aria-disabled="true">
        <svg viewBox="0 0 32 32" aria-hidden="true"><rect x="7" y="5" width="18" height="23" rx="2"/><path d="M12 4v4m8-4v4m-8 6h8m-8 5h8m-8 5h5"/></svg>
        <span>订单</span>
      </span>
      <a class="tabbar-item" href="img.html">
        <svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="16" r="12"/><g class="golf-ball-dots"><circle cx="12" cy="12" r="1"/><circle cx="17" cy="9" r="1"/><circle cx="21" cy="13" r="1"/><circle cx="10" cy="18" r="1"/><circle cx="16" cy="17" r="1"/><circle cx="21" cy="20" r="1"/><circle cx="14" cy="23" r="1"/></g></svg>
        <span>会员卡</span>
      </a>
      <span class="tabbar-item" aria-disabled="true">
        <svg viewBox="0 0 32 32" aria-hidden="true"><rect x="7" y="5" width="18" height="23" rx="2"/><path d="M11 11h10M11 16h10m-10 5h6"/></svg>
        <span>月结单</span>
      </span>
      <span class="tabbar-item" aria-disabled="true">
        <svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="10" r="5"/><path d="M6 28c.7-6.6 4-10 10-10s9.3 3.4 10 10"/></svg>
        <span>我的</span>
      </span>
    </nav>
  </main>
  <script src="js/mission-hills-home.js"></script>
</body>
</html>
